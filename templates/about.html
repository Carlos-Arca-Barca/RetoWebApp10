{% extends "base.html" %}

{% block titulo %}About{% endblock %}

{% block contenido %}

<div class="columns is-centered">
  <div class="column is-half">

    <div class="box">

      <!-- HEADER -->
      <div class="level mb-5">
        <div class="level-left">

          <span class="icon is-medium mr-2">
            <i class="fa-solid fa-circle-info fa-2x"></i>
          </span>

          <h1 class="title is-5 mb-0">
            About
          </h1>

        </div>
      </div>

      <hr>

      <!-- DESARROLLADOR -->
      <div class="field is-horizontal">
        <div class="field-label is-normal">
          <label class="label">Desarrollador</label>
        </div>

        <div class="field-body">
          <div class="field">
            <div class="control">
              <input class="input" type="text" value="{{ desarrollador }}" readonly>
            </div>
          </div>
        </div>
      </div>

      <!-- PRODUCTO -->
      <div class="field is-horizontal">
        <div class="field-label is-normal">
          <label class="label">Producto</label>
        </div>

        <div class="field-body">
          <div class="field">
            <div class="control">
              <input class="input" type="text" value="Pitonizando con Flask" readonly>
            </div>
          </div>
        </div>
      </div>

      <!-- VERSIÓN -->
      <div class="field is-horizontal">
        <div class="field-label is-normal">
          <label class="label">Versión</label>
        </div>

        <div class="field-body">
          <div class="field">
            <div class="control">
              <input class="input" type="text" value="{{ version }}" readonly>
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

{% endblock %}
