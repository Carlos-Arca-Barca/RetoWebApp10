{% extends "base.html" %}

{% block titulo %}Datos{% endblock %}

{% block contenido %}

<div class="columns is-centered">
  <div class="column is-half">

    <div class="box">

      <!-- HEADER -->
      <div class="level mb-5">
        <div class="level-left">

          <span class="icon is-medium mr-2">
            <i class="fa-solid fa-chart-simple fa-2x"></i>
          </span>

          <h1 class="title is-5 mb-0">
            Datos
          </h1>

        </div>
      </div>

      <hr>

      <!-- NOMBRE -->
      <div class="field is-horizontal">
        <div class="field-label is-normal">
          <label class="label">Nombre</label>
        </div>

        <div class="field-body">
          <div class="field">
            <div class="control">
              <input class="input" type="text" value="{{ nombre }}" readonly>
            </div>
          </div>
        </div>
      </div>

      <!-- EDAD -->
      <div class="field is-horizontal">
        <div class="field-label is-normal">
          <label class="label">Edad</label>
        </div>

        <div class="field-body">
          <div class="field">
            <div class="control">
              <input class="input" type="text" value="{{ edad }}" readonly>
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

{% endblock %}
