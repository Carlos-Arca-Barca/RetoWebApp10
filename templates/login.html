{% extends "base.html" %}

{% block titulo %}Login{% endblock %}

{% block contenido %}

<div class="columns is-centered">
  <div class="column is-half">

    <div class="box">

      <!-- HEADER -->
      <div class="level mb-5">
        <div class="level-left">

          <span class="icon is-medium mr-2">
            <i class="fa-solid fa-right-to-bracket fa-2x"></i>
          </span>

          <h1 class="title is-5 mb-0">
            Acceso
          </h1>

        </div>
      </div>

      <hr>

      <!-- FORM -->
      <form method="post">

        <!-- USUARIO -->
        <div class="field is-horizontal">
          <div class="field-label is-normal">
            <label class="label">Usuario</label>
          </div>

          <div class="field-body">
            <div class="field">
              <div class="control">
                <input class="input" type="text" name="nombre" placeholder="Tu usuario" required>
              </div>
            </div>
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="field is-horizontal">
          <div class="field-label is-normal">
            <label class="label">Password</label>
          </div>

          <div class="field-body">
            <div class="field">
              <div class="control">
                <input class="input" type="password" name="password" placeholder="Contraseña" required>
              </div>
            </div>
          </div>
        </div>

        <!-- BOTÓN -->
        <div class="field mt-5">
          <div class="control">
            <button class="button is-primary is-fullwidth">
              Entrar
            </button>
          </div>
        </div>

      </form>

      <hr>

      <!-- LINK REGISTRO -->
      <div class="has-text-centered">
        <p>
          ¿No tienes cuenta?
          <a href="{{ url_for('registro') }}">Regístrate aquí</a>
        </p>
      </div>

    </div>

  </div>
</div>

{% endblock %}
